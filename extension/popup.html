<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fake News Detector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>Fake News Detector</h2>
    <p class="subtitle">Select an image and text on the page, right-click, and choose "Analyze Fake News".</p>
    
    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>Analyzing...</p>
    </div>

    <div id="result-container" class="hidden">
      <div id="result-badge" class="badge"></div>
      <p id="confidence-text"></p>
      
      <div class="scores">
        <div>Similarity: <span id="score-sim"></span></div>
        <div>Text Suspicious: <span id="score-text"></span></div>
        <div>Image Manipulation: <span id="score-img"></span></div>
      </div>
      
      <h4>Reasons:</h4>
      <ul id="reasons-list"></ul>
    </div>
    
    <div id="error-container" class="hidden">
      <p id="error-message"></p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
